name: Release Plugin

on:
  push:
    branches:
      - '**'
    tags: ['v*']
    paths-ignore:
      - '.github/**'
      - 'README.md'
      - 'docs/**'
      - 'Test/**'
      - 'Tests/**'
      - 'tests/**'
      - 'coverage-html/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: totalarticulos-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: read
  contents: write

jobs:
  verify_tests:
    name: Verify Tests Workflow
    timeout-minutes: 20
    runs-on: ${{ vars.BEPLY_GHA_RUNNER || 'arc-runner-set' }}

    steps:
      - name: Wait for Tests workflow on this commit
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TARGET_SHA: ${{ github.sha }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import sys
          import time
          import urllib.request

          repository = os.environ["REPOSITORY"]
          target_sha = os.environ["TARGET_SHA"]
          current_run_id = int(os.environ["CURRENT_RUN_ID"])
          token = os.environ["GITHUB_TOKEN"]
          api_url = f"https://api.github.com/repos/{repository}/actions/runs?head_sha={target_sha}&per_page=100"
          deadline = time.time() + 19 * 60

          def fetch_runs():
              request = urllib.request.Request(
                  api_url,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "User-Agent": "totalarticulos-release-gate",
                  },
              )
              with urllib.request.urlopen(request) as response:
                  return json.load(response)

          while time.time() < deadline:
              payload = fetch_runs()
              runs = [
                  run for run in payload.get("workflow_runs", [])
                  if run.get("name") == "Tests" and int(run.get("id", 0)) != current_run_id
              ]

              if not runs:
                  print("Waiting for Tests workflow to start on this commit...")
                  time.sleep(15)
                  continue

              run = runs[0]
              status = run.get("status")
              conclusion = run.get("conclusion")
              html_url = run.get("html_url", "")
              print(f"Tests workflow status={status} conclusion={conclusion} url={html_url}")

              if status != "completed":
                  time.sleep(15)
                  continue

              if conclusion == "success":
                  sys.exit(0)

              print(f"Tests workflow did not succeed: {conclusion}", file=sys.stderr)
              sys.exit(1)

          print("Timed out waiting for Tests workflow to complete successfully.", file=sys.stderr)
          sys.exit(1)
          PY

  upload_dev:
    name: Upload Dev Candidate
    needs: verify_tests
    if: github.ref_type == 'branch' && github.ref_name == (vars.BEPLY_RELEASE_BRANCH || github.event.repository.default_branch) && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    timeout-minutes: 15
    runs-on: ${{ vars.BEPLY_GHA_RUNNER || 'arc-runner-set' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Parse facturascripts.ini
        id: ini
        run: |
          parse_field() {
            local key="$1"
            local value
            value=$(grep -E "^${key}\\s*=" facturascripts.ini | head -1 | sed 's/^[^=]*=[ ]*//' | sed 's/^\"\\(.*\\)\"$/\\1/' | tr -d '\r' | xargs)
            echo "$value"
          }

          {
            echo "version=$(parse_field version)"
            echo "name=$(parse_field name)"
          } >> "$GITHUB_OUTPUT"

      - name: Build plugin zip
        env:
          PLUGIN_NAME: ${{ steps.ini.outputs.name }}
          PLUGIN_VERSION: ${{ steps.ini.outputs.version }}
        run: |
          set -e
          export PLUGIN_NAME PLUGIN_VERSION
          python3 - <<'PY'
          import os
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile

          root = Path.cwd()
          name = os.environ["PLUGIN_NAME"]
          version = os.environ["PLUGIN_VERSION"]
          zip_path = Path("/tmp") / f"{name}-dev-{version}.zip"
          excluded_roots = {
              ".git",
              ".github",
              "docs",
              "scripts",
              "Test",
              "Tests",
              "tests",
              "coverage-html",
              "playwright-report",
              "test-results",
          }
          excluded_names = {
              "README.md",
              "CLAUDE.md",
              ".gitignore",
              "coverage.xml",
              "coverage-report.txt",
          }

          def is_excluded(relative_path: Path) -> bool:
              if not relative_path.parts:
                  return False
              if relative_path.parts[0] in excluded_roots:
                  return True
              if relative_path.name == ".env":
                  return True
              if relative_path.name.startswith(".env") and relative_path.name != ".env.example":
                  return True
              return relative_path.name in excluded_names

          with ZipFile(zip_path, "w", compression=ZIP_DEFLATED) as archive:
              for path in sorted(root.rglob("*")):
                  relative = path.relative_to(root)
                  if is_excluded(relative):
                      continue
                  archive_name = Path(name) / relative
                  if path.is_dir():
                      archive.writestr(f"{archive_name.as_posix()}/", "")
                  else:
                      archive.write(path, archive_name.as_posix())
          PY

      - name: Upload candidate to Beply dev
        env:
          BEPLY_API_URL: https://api.services.devbeply.es
          BEPLY_DEV_CI_TOKEN: ${{ secrets.BEPLY_DEV_CI_TOKEN }}
          PLUGIN_NAME: ${{ steps.ini.outputs.name }}
          PLUGIN_VERSION: ${{ steps.ini.outputs.version }}
        run: |
          set -e
          ZIP="/tmp/${PLUGIN_NAME}-dev-${PLUGIN_VERSION}.zip"
          SOURCE_URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
          SOURCE_TAG="${GITHUB_REF_NAME}-${GITHUB_SHA::12}"
          PUBLISHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          if [ -z "$BEPLY_DEV_CI_TOKEN" ]; then
            echo "::warning::BEPLY_DEV_CI_TOKEN not configured. Skipping dev platform upload."
            exit 0
          fi

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${BEPLY_DEV_CI_TOKEN}" \
            -F "file=@${ZIP}" \
            -F "sourceRepoFullName=${{ github.repository }}" \
            -F "sourceReleaseTag=${SOURCE_TAG}" \
            -F "sourceReleaseUrl=${SOURCE_URL}" \
            -F "sourcePublishedAt=${PUBLISHED_AT}" \
            "${BEPLY_API_URL}/api/v1/plugins/release")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "::notice::Plugin uploaded to Beply dev. Pending admin review."
            echo "$BODY" | jq -r '.data | "Plugin: \(.pluginName) | Version: \(.version) | Status: \(.releaseStatus)"' 2>/dev/null || echo "$BODY"
            exit 0
          fi

          if [ "$HTTP_CODE" = "409" ] && echo "$BODY" | grep -q 'VERSION_ALREADY_APPROVED'; then
            echo "::notice::Version already approved in dev. No new candidate uploaded."
            echo "$BODY"
            exit 0
          fi

          echo "::error::Dev platform upload failed (HTTP $HTTP_CODE): $BODY"
          exit 1

  release_prod:
    name: Release Prod Candidate
    needs: verify_tests
    if: startsWith(github.ref, 'refs/tags/v') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    timeout-minutes: 15
    runs-on: ${{ vars.BEPLY_GHA_RUNNER || 'arc-runner-set' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Parse facturascripts.ini
        id: ini
        run: |
          parse_field() {
            local key="$1"
            local value
            value=$(grep -E "^${key}\\s*=" facturascripts.ini | head -1 | sed 's/^[^=]*=[ ]*//' | sed 's/^\"\\(.*\\)\"$/\\1/' | tr -d '\r' | xargs)
            echo "$value"
          }

          {
            echo "version=$(parse_field version)"
            echo "name=$(parse_field name)"
            echo "min_version=$(parse_field min_version)"
            echo "max_version=$(parse_field max_version)"
            echo "min_php=$(parse_field min_php)"
            echo "description=$(parse_field description)"
          } >> "$GITHUB_OUTPUT"

      - name: Validate tag matches plugin version
        run: |
          set -e
          EXPECTED_TAG="v${{ steps.ini.outputs.version }}"
          if [ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match facturascripts.ini version ${EXPECTED_TAG}"
            exit 1
          fi

      - name: Generate release notes
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..${GITHUB_REF_NAME}" --pretty=format:"- %s (%h)" --no-merges)
          else
            NOTES=$(git log "${GITHUB_REF_NAME}" --pretty=format:"- %s (%h)" --no-merges -20)
          fi

          if [ -z "$NOTES" ]; then
            NOTES="- Release inicial"
          fi

          {
            echo "notes<<CHANGELOG_EOF"
            echo "$NOTES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build plugin zip
        env:
          PLUGIN_NAME: ${{ steps.ini.outputs.name }}
          PLUGIN_VERSION: ${{ steps.ini.outputs.version }}
        run: |
          set -e
          export PLUGIN_NAME PLUGIN_VERSION
          python3 - <<'PY'
          import os
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile

          root = Path.cwd()
          name = os.environ["PLUGIN_NAME"]
          version = os.environ["PLUGIN_VERSION"]
          zip_path = Path("/tmp") / f"{name}-v{version}.zip"
          excluded_roots = {
              ".git",
              ".github",
              "docs",
              "scripts",
              "Test",
              "Tests",
              "tests",
              "coverage-html",
              "playwright-report",
              "test-results",
          }
          excluded_names = {
              "README.md",
              "CLAUDE.md",
              ".gitignore",
              "coverage.xml",
              "coverage-report.txt",
          }

          def is_excluded(relative_path: Path) -> bool:
              if not relative_path.parts:
                  return False
              if relative_path.parts[0] in excluded_roots:
                  return True
              if relative_path.name == ".env":
                  return True
              if relative_path.name.startswith(".env") and relative_path.name != ".env.example":
                  return True
              return relative_path.name in excluded_names

          with ZipFile(zip_path, "w", compression=ZIP_DEFLATED) as archive:
              for path in sorted(root.rglob("*")):
                  relative = path.relative_to(root)
                  if is_excluded(relative):
                      continue
                  archive_name = Path(name) / relative
                  if path.is_dir():
                      archive.writestr(f"{archive_name.as_posix()}/", "")
                  else:
                      archive.write(path, archive_name.as_posix())
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: "${{ github.ref_name }}"
          name: "${{ steps.ini.outputs.name }} ${{ github.ref_name }}"
          body: |
            ## ${{ steps.ini.outputs.name }} ${{ github.ref_name }}

            | Campo | Valor |
            |-------|-------|
            | **Version** | `${{ steps.ini.outputs.version }}` |
            | **Version minima FS** | `${{ steps.ini.outputs.min_version }}` |
            | **Version maxima FS** | `${{ steps.ini.outputs.max_version || 'Sin limite' }}` |
            | **PHP minimo** | `${{ steps.ini.outputs.min_php }}` |

            ### Descripcion
            ${{ steps.ini.outputs.description }}

            ### Notas de version
            ${{ steps.changelog.outputs.notes }}
          files: /tmp/${{ steps.ini.outputs.name }}-v${{ steps.ini.outputs.version }}.zip

      - name: Upload to Beply Platform
        env:
          BEPLY_API_URL: ${{ secrets.BEPLY_API_URL }}
          BEPLY_CI_TOKEN: ${{ secrets.BEPLY_CI_TOKEN }}
          PLUGIN_NAME: ${{ steps.ini.outputs.name }}
          PLUGIN_VERSION: ${{ steps.ini.outputs.version }}
        run: |
          ZIP="/tmp/${PLUGIN_NAME}-v${PLUGIN_VERSION}.zip"

          if [ -z "$BEPLY_API_URL" ] || [ -z "$BEPLY_CI_TOKEN" ]; then
            echo "::warning::BEPLY_API_URL or BEPLY_CI_TOKEN not configured. Skipping platform upload."
            exit 0
          fi

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${BEPLY_CI_TOKEN}" \
            -F "file=@${ZIP}" \
            -F "sourceRepoFullName=${{ github.repository }}" \
            -F "sourceReleaseTag=${GITHUB_REF_NAME}" \
            -F "sourceReleaseUrl=https://github.com/${{ github.repository }}/releases/tag/${GITHUB_REF_NAME}" \
            -F "sourcePublishedAt=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            "${BEPLY_API_URL}/api/v1/plugins/release")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "::notice::Plugin uploaded to Beply Platform. Pending admin review."
            echo "$BODY" | jq -r '.data | "Plugin: \(.pluginName) | Version: \(.version) | Status: \(.releaseStatus)"' 2>/dev/null || echo "$BODY"
            exit 0
          fi

          echo "::error::Platform upload failed (HTTP $HTTP_CODE): $BODY"
          exit 1
